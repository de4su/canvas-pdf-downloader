<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OPIT PDF Downloader</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        font-family: "Segoe UI", Arial, sans-serif;
        width: 360px;
        margin: 0;
        padding: 14px;
        background: radial-gradient(circle at top, #1d2840 0%, #101827 55%, #0b1220 100%);
        color: #e5e7eb;
      }
      .card {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.04));
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 20px;
        padding: 14px;
        box-shadow: 0 14px 34px rgba(0, 0, 0, 0.4);
      }
      h1 {
        font-size: 18px;
        margin: 0 0 10px;
        letter-spacing: 0.2px;
      }
      .sub {
        font-size: 12px;
        color: #9ca3af;
        margin-bottom: 8px;
        font-weight: 600;
      }
      .row {
        margin: 10px 0 12px;
      }
      .domain-row {
        display: flex;
        gap: 8px;
      }
      .domain-row input {
        flex: 1;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.28);
        color: #fff;
        padding: 9px 11px;
      }
      #domainList {
        margin-top: 8px;
        font-size: 12px;
        color: #cbd5e1;
        word-break: break-word;
        opacity: 0.9;
      }
      button {
        width: 100%;
        margin: 7px 0;
        padding: 10px 12px;
        border: 0;
        border-radius: 14px;
        cursor: pointer;
        color: #fff;
        font-weight: 700;
        letter-spacing: 0.2px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.22), 0 6px 14px rgba(0, 0, 0, 0.25);
        transition: transform 120ms ease, filter 120ms ease;
      }
      button:hover { filter: brightness(1.06); transform: translateY(-1px); }
      button:active { transform: translateY(0); }
      #scanBtn { background: linear-gradient(135deg, #3b82f6, #2563eb); }
      #downloadBtn { background: linear-gradient(135deg, #10b981, #059669); }
      #exportBtn { background: linear-gradient(135deg, #8b5cf6, #6d28d9); }
      #clearBtn { background: linear-gradient(135deg, #ef4444, #dc2626); }
      #aboutBtn { background: linear-gradient(135deg, #4b5563, #374151); }
      #addDomainBtn {
        width: auto;
        min-width: 76px;
        background: linear-gradient(135deg, #38bdf8, #0284c7);
      }
      #status {
        font-size: 12px;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        padding: 9px;
        white-space: pre-wrap;
      }
      .meta {
        font-size: 12px;
        margin: 10px 0 8px;
        color: #d1d5db;
        font-weight: 600;
      }
      label {
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>OPIT PDF Downloader</h1>

      <div class="row">
        <label>
          <input id="autoDownload" type="checkbox" />
          Auto-download on page load
        </label>
      </div>

      <div class="row">
        <div class="sub">Allowed Canvas domains</div>
        <div class="domain-row">
          <input id="domainInput" placeholder="e.g. canvas.myuni.edu or *.instructure.com" />
          <button id="addDomainBtn">Add</button>
        </div>
        <div id="domainList">Domains: opit.instructure.com</div>
      </div>

      <button id="scanBtn">Scan Current Page</button>
      <button id="downloadBtn">Download PDFs From Current Page</button>
      <button id="exportBtn">Export Scan JSON</button>
      <button id="clearBtn">Clear Download History</button>
      <button id="aboutBtn">About</button>

      <div id="counts" class="meta">PDFs: 0 | Live sessions: 0</div>
      <div id="status">Ready.</div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
